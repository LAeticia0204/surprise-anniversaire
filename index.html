<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surprise 🎉</title>

  <style>
    body{
      margin:0;
      overflow:hidden;
      background:linear-gradient(135deg,#f78fb3,#f8a5c2,#fbc2eb);
      font-family:Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .card{
      background:rgba(255,255,255,0.96);
      padding:30px;
      border-radius:30px;
      text-align:center;
      box-shadow:0 12px 35px rgba(0,0,0,0.18);
      z-index:2;
      width:700px;
      max-width:90vw;
    }

    .images{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:25px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .photo{
      width:300px;
      height:300px;
      border-radius:20px;
      object-fit:contain;
      background:white;
      border:8px solid white;
      box-shadow:0 8px 25px rgba(0,0,0,0.22);
    }

    .reaction{
      width:220px;
      height:300px;
      border-radius:20px;
      object-fit:cover;
      object-position:center;
      border:8px solid white;
      box-shadow:0 8px 25px rgba(0,0,0,0.22);
    }

    h1{
      color:#e84393;
      font-size:56px;
      margin:10px 0 12px 0;
    }

    p{
      font-size:32px;
      color:#444;
      margin:0;
      font-weight:600;
      line-height:1.3;
    }

    .small-text{
      margin-top:10px;
      font-size:24px;
      color:#666;
      font-weight:500;
    }

    .confetti{
      position:absolute;
      width:14px;
      height:14px;
      top:-20px;
      animation:fall linear forwards;
      opacity:0.95;
    }

    @keyframes fall{
      to{
        transform:translateY(110vh) rotate(720deg);
      }
    }

    @media (max-width: 768px){
      .card{
        width:92vw;
        padding:22px;
      }

      .photo{
        width:260px;
        height:260px;
      }

      .reaction{
        width:200px;
        height:260px;
      }

      h1{
        font-size:42px;
      }

      p{
        font-size:24px;
      }

      .small-text{
        font-size:18px;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="images">
      <img src="photo.jpg" alt="Massage" class="photo">
      <img src="moi.jpg" alt="Moi choquée" class="reaction">
    </div>

    <h1>Surprise 🎉</h1>
    <p>Joyeux anniversaire ma sœur ❤️</p>
    <div class="small-text"><div class="small-text">Voilà, tu auras enfin ton moment à toi 💆‍♀️✨</div>
  </div>

  <script>
    function confetti(){
      const c = document.createElement("div");
      c.classList.add("confetti");

      const colors = [
        "#ff4f81",
        "#ffd166",
        "#06d6a0",
        "#118ab2",
        "#9b5de5",
        "#ff8fab",
        "#f15bb5",
        "#f9c74f"
      ];

      c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      c.style.left = Math.random() * window.innerWidth + "px";
      c.style.animationDuration = (3 + Math.random() * 3) + "s";

      document.body.appendChild(c);

      setTimeout(() => {
        c.remove();
      }, 6000);
    }

    setInterval(confetti, 80);
  </script>

</body>
</html>
